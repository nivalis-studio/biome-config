name: Biome Insights Artifact

on:
  workflow_call:
    inputs:
      config-repository:
        description: Repository that hosts normalizer scripts.
        required: false
        type: string
        default: nivalis-studio/biome-config
      config-ref:
        description: Ref in config repository.
        required: false
        type: string
        default: main
      shared-config-version:
        description: Shared config version/hash used by caller repo.
        required: false
        type: string
        default: ''
      local-config-hash:
        description: Optional local config hash for drift tracking.
        required: false
        type: string
        default: ''

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Setup Biome
        uses: biomejs/setup-biome@v2

      - name: Check Biome version
        run: biome --version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome CI JSON reporter
        id: biome
        continue-on-error: true
        run: biome ci --json . > "$RUNNER_TEMP/biome-raw.json"

      - name: Debug Biome output
        if: always()
        run: |
          echo "=== Biome raw output (first 500 chars) ==="
          head -c 500 "$RUNNER_TEMP/biome-raw.json" || echo "File not found or empty"
          echo ""
          echo "=== File size ==="
          wc -c "$RUNNER_TEMP/biome-raw.json" || echo "File not found"

      - name: Checkout biome-config scripts
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.config-repository }}
          ref: ${{ inputs.config-ref }}
          path: .nivalis-biome-config

      - name: Create output directory
        run: mkdir -p .biome-insights

      - name: Normalize diagnostics artifact
        id: normalize
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          LOCAL_CONFIG_HASH: ${{ inputs.local-config-hash }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          SHARED_CONFIG_VERSION: ${{ inputs.shared-config-version }}
        run: |
          BIOME_VERSION=$(biome --version)
          node .nivalis-biome-config/scripts/biome-insights/normalize.mjs \
            --input "$RUNNER_TEMP/biome-raw.json" \
            --output .biome-insights/biome-normalized.json \
            --repo "${{ github.repository }}" \
            --pr "$PR_NUMBER" \
            --sha "${{ github.sha }}" \
            --base-sha "$BASE_SHA" \
            --run-id "${{ github.run_id }}" \
            --timestamp "${{ github.run_started_at }}" \
            --biome-version "$BIOME_VERSION" \
            --shared-config-version "$SHARED_CONFIG_VERSION" \
            --local-config-hash "$LOCAL_CONFIG_HASH"

      - name: Ensure output file exists
        if: always()
        run: |
          mkdir -p .biome-insights
          if [ ! -f .biome-insights/biome-normalized.json ]; then
            echo '{"generatedAt":"'$(date -Iseconds)'","run":{"repo":"${{ github.repository }}","sha":"${{ github.sha }}","runId":"${{ github.run_id }}"},"schemaVersion":1,"summary":{"diagnostics":0,"errors":0,"fixable":0,"infos":0,"warnings":0},"diagnostics":[]}' > .biome-insights/biome-normalized.json
            echo "Created fallback empty artifact"
          fi
          echo "=== Output file status ==="
          ls -la .biome-insights/
          echo "=== File content (first 300 chars) ==="
          head -c 300 .biome-insights/biome-normalized.json

      - name: Upload normalized artifact
        uses: actions/upload-artifact@v4
        with:
          name: biome-insights-${{ github.repository_id }}-${{ github.run_id }}
          path: .biome-insights/
          if-no-files-found: error

      - name: Upsert PR summary comment for touched-file errors
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { resolve } = require('node:path');
            const scriptPath = resolve(
              '.nivalis-biome-config/scripts/biome-insights/upsert-pr-comment.cjs',
            );
            const {
              upsertBiomeChangedFilesComment,
            } = require(scriptPath);

            await upsertBiomeChangedFilesComment({
              artifactPath: '.biome-insights/biome-normalized.json',
              context,
              core,
              github,
            });

      - name: Fail when Biome reports diagnostics
        if: steps.biome.outcome == 'failure'
        run: exit 1
