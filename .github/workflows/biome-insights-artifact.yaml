name: Biome Insights Artifact

on:
  workflow_call:
    inputs:
      config-repository:
        description: Repository that hosts normalizer scripts.
        required: false
        type: string
        default: nivalis-studio/biome-config
      config-ref:
        description: Ref in config repository.
        required: false
        type: string
        default: main
      shared-config-version:
        description: Shared config version/hash used by caller repo.
        required: false
        type: string
        default: ''
      local-config-hash:
        description: Optional local config hash for drift tracking.
        required: false
        type: string
        default: ''

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Setup Biome
        uses: biomejs/setup-biome@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome CI JSON reporter
        id: biome
        run: |
          set +e
          mkdir -p .biome-insights
          biome ci --reporter=json . > "$RUNNER_TEMP/biome-raw.json"
          BIOME_EXIT=$?
          echo "exit_code=$BIOME_EXIT" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Checkout biome-config scripts
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.config-repository }}
          ref: ${{ inputs.config-ref }}
          path: .nivalis-biome-config

      - name: Normalize diagnostics artifact
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          LOCAL_CONFIG_HASH: ${{ inputs.local-config-hash }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          SHARED_CONFIG_VERSION: ${{ inputs.shared-config-version }}
        run: |
          BIOME_VERSION=$(biome --version)
          node .nivalis-biome-config/scripts/biome-insights/normalize.mjs \
            --input "$RUNNER_TEMP/biome-raw.json" \
            --output .biome-insights/biome-normalized.json \
            --repo "${{ github.repository }}" \
            --pr "$PR_NUMBER" \
            --sha "${{ github.sha }}" \
            --base-sha "$BASE_SHA" \
            --run-id "${{ github.run_id }}" \
            --timestamp "${{ github.run_started_at }}" \
            --biome-version "$BIOME_VERSION" \
            --shared-config-version "$SHARED_CONFIG_VERSION" \
            --local-config-hash "$LOCAL_CONFIG_HASH"

      - name: Upload normalized artifact
        uses: actions/upload-artifact@v4
        with:
          name: biome-insights-${{ github.repository_id }}-${{ github.run_id }}
          path: .biome-insights/
          if-no-files-found: error

      - name: Upsert PR summary comment for touched-file errors
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');

            const marker = '<!-- nivalis-biome-insights:changed-files-errors:v1 -->';
            const maxRows = 50;

            const normalizePath = value => {
              return String(value ?? '')
                .replaceAll('\\', '/')
                .replace(/^\.\//, '')
                .replace(/^\//, '');
            };

            const artifactPath = path.resolve('.biome-insights/biome-normalized.json');

            if (!fs.existsSync(artifactPath)) {
              core.warning(`No normalized artifact found at ${artifactPath}.`);
              return;
            }

            const parsed = JSON.parse(fs.readFileSync(artifactPath, 'utf8'));
            const diagnostics = Array.isArray(parsed?.diagnostics)
              ? parsed.diagnostics
              : [];

            const pullNumber = context.payload.pull_request?.number;

            if (!pullNumber) {
              core.info('No pull request context found. Skipping comment.');
              return;
            }

            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            const touchedPaths = new Set();

            for (const file of changedFiles) {
              if (file.status !== 'removed') {
                touchedPaths.add(normalizePath(file.filename));
              }

              if (file.status === 'renamed' && file.previous_filename) {
                touchedPaths.add(normalizePath(file.previous_filename));
              }
            }

            const touchedErrors = diagnostics
              .filter(diagnostic => {
                return (
                  String(diagnostic?.severity).toLowerCase() === 'error' &&
                  touchedPaths.has(normalizePath(diagnostic?.filePath))
                );
              })
              .sort((left, right) => {
                const leftPath = normalizePath(left.filePath);
                const rightPath = normalizePath(right.filePath);

                if (leftPath !== rightPath) {
                  return leftPath.localeCompare(rightPath);
                }

                const leftLine = Number(left.line ?? 0);
                const rightLine = Number(right.line ?? 0);

                if (leftLine !== rightLine) {
                  return leftLine - rightLine;
                }

                const leftRule = `${left.domain}/${left.rule}`;
                const rightRule = `${right.domain}/${right.rule}`;

                if (leftRule !== rightRule) {
                  return leftRule.localeCompare(rightRule);
                }

                return String(left.fingerprint ?? '').localeCompare(
                  String(right.fingerprint ?? ''),
                );
              });

            const filesWithErrors = new Set(
              touchedErrors.map(diagnostic => normalizePath(diagnostic.filePath)),
            );

            const displayRows = touchedErrors.slice(0, maxRows);
            const hiddenCount = touchedErrors.length - displayRows.length;

            const formatRule = diagnostic => {
              return `${diagnostic.domain}/${diagnostic.rule}`;
            };

            const formatMessage = diagnostic => {
              return String(diagnostic.message ?? '')
                .replace(/\s+/g, ' ')
                .trim();
            };

            const lines = [
              marker,
              '## Biome summary (changed files)',
              '',
              `- Errors on changed files: **${touchedErrors.length}**`,
              `- Changed files with errors: **${filesWithErrors.size}**`,
              '',
            ];

            if (touchedErrors.length === 0) {
              lines.push('No Biome errors found on touched files in this PR.');
            } else {
              lines.push('| File | Line | Rule | Message |');
              lines.push('| --- | --- | --- | --- |');

              for (const diagnostic of displayRows) {
                const filePath = normalizePath(diagnostic.filePath);
                const line = Number(diagnostic.line ?? 1);
                const rule = formatRule(diagnostic);
                const message = formatMessage(diagnostic)
                  .replaceAll('|', '\\|')
                  .slice(0, 160);
                lines.push(`| \`${filePath}\` | ${line} | \`${rule}\` | ${message} |`);
              }

              if (hiddenCount > 0) {
                lines.push('');
                lines.push(`Showing first ${maxRows} findings. ${hiddenCount} additional findings are omitted.`);
              }
            }

            lines.push('');
            lines.push('_This comment is updated on each workflow run._');

            const body = lines.join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullNumber,
              per_page: 100,
            });

            const existingComment = comments.find(comment => {
              return comment.body?.includes(marker);
            });

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });

              core.info(`Updated PR comment ${existingComment.id}.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullNumber,
              body,
            });

            core.info('Created PR comment.');

      - name: Fail when Biome reports diagnostics
        if: steps.biome.outputs.exit_code != '0'
        run: exit 1
